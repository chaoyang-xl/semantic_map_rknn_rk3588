sam_rknn_projector:
  ros__parameters:
    input_topic: /yolo/results_json
    color_topic: /camera/color/image_raw
    depth_topic: /camera/depth/image_raw
    cloud_topic: /semantic_rknn/points
    metadata_topic: /semantic_rknn/detections
    target_frame: map
    camera_frame: camera_color_optical_frame
    camera_fx: 365.1741638183594
    camera_fy: 365.42144775390625
    camera_cx: 318.27630615234375
    camera_cy: 243.80377197265625
    depth_scale: 0.001
    min_depth_m: 0.3
    max_depth_m: 5.0
    pixel_stride: 2
    min_confidence: 0.50
    excluded_labels: person
    max_time_diff_s: 0.15
    processing_delay_frames: 0
    detection_buffer_size: 50
    color_buffer_size: 20
    image_qos_reliable: false
    tf_timeout_s: 0.1
    projection_voxel_size: 0.01
    projection_cluster_eps: 0.10
    projection_cluster_min_points: 10
    mask_threshold: 0.0
    mask_erode_px: 2
    publish_debug_image: true

semantic_rknn_fusion:
  ros__parameters:
    cloud_topic: /semantic_rknn/points
    metadata_topic: /semantic_rknn/detections
    fused_cloud_topic: /semantic_rknn/fused_points
    objects_topic: /semantic_objects
    marker_topic: /semantic_rknn/object_markers
    publish_markers: true
    voxel_size: 0.02
    overlap_radius: 0.04
    max_centroid_distance_m: 0.75
    min_geometric_overlap: 0.08
    association_threshold: 0.50
    geometry_weight: 0.70
    semantic_weight: 0.30
    observation_cluster_eps: 0.10
    observation_cluster_min_points: 10
    max_extent_growth: 1.50
    denoise_interval: 20
    map_merge_interval: 0
    min_confirmed_observations: 8
    candidate_max_missed_frames: 30
    non_fusing_labels: person
    snapshot_interval_s: 2.0
